name: Release

on:
  push:
    tags:
      - "20[0-9][0-9].[0-1][0-9].[0-3][0-9]*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read pinned Flutter version
        id: flutter_version
        run: |
          version=$(python3 -c "import json; print(json.load(open('.fvmrc'))['flutter'])")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter_version.outputs.version }}
          channel: stable

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Decode signing keystore
        run: echo -n "${{ secrets.SIGNING_JKS_FILE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks

      - run: flutter pub get

      - name: Build release APK
        env:
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
        run: |
          flutter build apk --release \
            --build-name="${GITHUB_REF_NAME}" \
            --build-number="${GITHUB_RUN_NUMBER}"

      - name: Remove signing keystore
        if: always()
        run: rm -f android/app/upload-keystore.jks

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk pitchforklauncher-${GITHUB_REF_NAME}.apk

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: pitchforklauncher-${{ github.ref_name }}.apk
          generate_release_notes: true
