name: flauncher
description: Flutter-based Android TV launcher.

version: 0.0.1

environment:
  sdk: ">=3.2.0 <3.3.0"
  flutter: ">=3.16.9 <3.17.0"

dependencies:
  flutter:
    sdk: flutter

  image_picker: ^1.0.4
  intl: ^0.18.0
  drift: ^2.10.0
  path_provider: ^2.1.1
  package_info_plus: ^4.0.0
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  sqlite3_flutter_libs: ^0.5.13
  unsplash_client: ^2.1.0+3
  webview_flutter: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.3.3
  lints: ^1.0.1
  mockito: ^5.4.1
  drift_dev: ^2.10.0
  network_image_mock: ^2.1.1
  transparent_image: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
