name: flauncher
description: Flutter-based Android TV launcher.

version: 0.0.1

environment:
  sdk: ">=3.12.0 <3.13.0"
  flutter: ">=3.44.6 <3.45.0"

dependencies:
  flutter:
    sdk: flutter

  http: ^1.6.0
  image_picker: ^1.2.3
  intl: ^0.18.0
  drift: ^2.34.0
  path_provider: ^2.1.6
  package_info_plus: ^10.2.1
  provider: ^6.1.5+1
  shared_preferences: ^2.3.3
  sqlite3_flutter_libs: ^0.5.13
  unsplash_client: ^2.1.0+3
  webview_flutter: ^4.14.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.9
  lints: ^1.0.1
  mockito: ^5.4.4
  drift_dev: ^2.34.0
  network_image_mock: ^2.1.1
  transparent_image: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/

dependency_overrides:
  # Transitively pulled in by path_provider_android/shared_preferences_android/etc. 2.0.17's
  # Java code still references io.flutter.plugin.common.PluginRegistry.Registrar, part of the
  # v1 Android embedding that Flutter removed entirely at this stop -- hard compile error
  # ("cannot find symbol") otherwise.
  flutter_plugin_android_lifecycle: ^2.0.28
