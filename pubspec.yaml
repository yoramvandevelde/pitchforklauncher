name: flauncher
description: Flutter-based Android TV launcher.

version: 2026.07.24

environment:
  sdk: ">=3.12.0 <3.13.0"
  flutter: ">=3.44.6 <3.45.0"

dependencies:
  flutter:
    sdk: flutter

  http: ^1.6.0
  image_picker: ^1.2.3
  intl: ^0.20.0
  drift: ^2.34.0
  path: ^1.9.1
  path_provider: ^2.1.6
  package_info_plus: ^10.2.1
  provider: ^6.1.5+1
  shared_preferences: ^2.3.3
  sqlite3: ^3.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.9
  lints: ^6.0.0
  mockito: ^5.4.4
  drift_dev: ^2.34.0
  network_image_mock: ^2.1.1
  transparent_image: ^2.0.1
  package_info_plus_platform_interface: ^4.1.0
  path_provider_platform_interface: ^2.1.1
  plugin_platform_interface: ^2.1.8
  shared_preferences_platform_interface: ^2.4.2

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/fonts/
  fonts:
    - family: Open Sans
      fonts:
        - asset: assets/fonts/OpenSans-Variable.ttf
