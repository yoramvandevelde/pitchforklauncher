name: flauncher
description: Flutter-based Android TV launcher.

version: 0.0.1

environment:
  sdk: ">=3.6.0 <3.7.0"
  flutter: ">=3.27.4 <3.28.0"

dependencies:
  flutter:
    sdk: flutter

  image_picker: ^1.0.4
  intl: ^0.18.0
  drift: ^2.10.0
  path_provider: ^2.1.1
  package_info_plus: ^4.0.0
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  sqlite3_flutter_libs: ^0.5.13
  unsplash_client: ^2.1.0+3
  webview_flutter: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.3.3
  lints: ^1.0.1
  mockito: ^5.4.1
  drift_dev: ^2.10.0
  network_image_mock: ^2.1.1
  transparent_image: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/

dependency_overrides:
  # build_runner 2.4.9's frontend_server_client (3.2.0) only knows how to start the
  # frontend server from its JIT snapshot, which the Flutter-bundled Dart SDK no longer
  # ships from this stop onward -- `pub run build_runner` fails outright without this.
  # frontend_server_client 4.0.0 prefers the AOT snapshot, which is present.
  frontend_server_client: ^4.0.0
  # Transitively pulled in by path_provider_windows/shared_preferences_windows (desktop
  # federated implementations we don't use on Android, but still compiled for `flutter test`
  # on this macOS dev host). win32 4.1.4's Guid class references
  # dart:typed_data's UnmodifiableUint8ListView, removed from the SDK at this Dart version.
  # 5.5.1 is the first version that migrated away from it; pinned below 5.11.0 since that's
  # where win32 starts requiring a newer Dart SDK than this Flutter stop bundles.
  win32: ">=5.5.1 <5.11.0"
